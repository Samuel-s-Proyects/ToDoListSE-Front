<ng-container *transloco="let t">
  <h2 mat-dialog-title>{{ t(data.titleKey) }}</h2>
  <mat-dialog-content>
    <form [formGroup]="form" class="task-form-dialog__form">
      <app-input
        [control]="$any(form.controls.title)"
        [label]="t(data.titleLabelKey)"
        [errorMessages]="{ required: t(data.titleRequiredKey) }"
        type="text">
      </app-input>
      <mat-form-field appearance="outline" class="task-form-dialog__textarea">
        <mat-label>{{ t(data.descriptionLabelKey) }}</mat-label>
        <textarea
          matInput
          formControlName="description"
          rows="3"
          maxlength="1000">
        </textarea>
      </mat-form-field>
      <mat-form-field appearance="outline" *ngIf="data.categories.length > 0">
        <mat-label>{{ t(data.categoryLabelKey) }}</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option [value]="null">{{ t(data.noCategoryKey) }}</mat-option>
          <mat-option *ngFor="let cat of data.categories" [value]="cat.id">
            {{ cat.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" *ngIf="isEditing && data.statusLabelKey">
        <mat-label>{{ t(data.statusLabelKey) }}</mat-label>
        <mat-select formControlName="completed">
          <mat-option [value]="false">{{ t(data.pendingLabelKey!) }}</mat-option>
          <mat-option [value]="true">{{ t(data.completedLabelKey!) }}</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <app-button
      variant="text"
      (clicked)="onCancel()">
      {{ t(data.cancelKey) }}
    </app-button>
    <app-button
      variant="primary"
      (clicked)="onConfirm()">
      {{ t(data.confirmKey) }}
    </app-button>
  </mat-dialog-actions>
</ng-container>
