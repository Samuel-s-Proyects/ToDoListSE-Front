<mat-form-field appearance="outline" class="app-input">
  <mat-label *ngIf="label">{{ label }}</mat-label>
  <input
    matInput
    [formControl]="control"
    [placeholder]="placeholder"
    [type]="type" />
  <mat-hint *ngIf="hint && !errorKey">{{ hint }}</mat-hint>
  <mat-error *ngIf="errorKey && errorMessages[errorKey]">
    {{ errorMessages[errorKey] }}
  </mat-error>
</mat-form-field>
